name: CI checks

on:
  pull_request:
  push:
    branches: main
  merge_group:

permissions: {}

env:
  # `--all-features` pulls in `dev-graph`, which needs fontconfig to build `plotters`.
  LINUX_BUILD_DEPS: libfontconfig1-dev

jobs:
  test:
    name: Test on Linux with ${{ matrix.features.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - name: all features
            flags: --all-features
          - name: no default features
            flags: --no-default-features
          - name: default features
            flags: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y $LINUX_BUILD_DEPS
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: ${{ matrix.features.flags == '--all-features' }}
      - name: Run tests
        run: cargo test --verbose --release ${{ matrix.features.flags }}
      - name: Verify working directory is clean
        run: git diff --exit-code

  # Advisory, so that a platform-specific toolchain hiccup cannot block a merge; Linux
  # is the gate. Default features only, to avoid needing fontconfig on these runners.
  test-other-os:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macOS-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: "false"
      - name: Run tests
        run: cargo test --verbose --release
      - name: Verify working directory is clean
        run: git diff --exit-code

  build-latest:
    name: Latest build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Override the `rust-toolchain.toml` MSRV pin so this job really does exercise the
    # latest stable toolchain, against the latest dependencies.
    env:
      RUSTUP_TOOLCHAIN: stable
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Pinned to a hash, so the toolchain has to be named explicitly rather than
      # inferred from the ref.
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        id: toolchain
        with:
          toolchain: stable
      - run: rustup override set "${TOOLCHAIN}"
        shell: sh
        env:
          TOOLCHAIN: ${{ steps.toolchain.outputs.name }}
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y $LINUX_BUILD_DEPS
      - name: Remove lockfile to build with latest dependencies
        run: rm Cargo.lock
      - name: Build crate
        run: cargo build --all-features --verbose
      - name: Verify working directory is clean (excluding lockfile)
        run: git diff --exit-code ':!Cargo.lock'

  build-nostd:
    name: Build no_std for target ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - wasm32-wasip1
          - thumbv7em-none-eabihf
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: crate_root
      # We use a synthetic crate to ensure no dev-dependencies are enabled, which can
      # be incompatible with some of these targets.
      - name: Create synthetic crate for testing
        run: cargo init --edition 2024 --lib ci-build
      - name: Copy Rust version into synthetic crate
        run: cp crate_root/rust-toolchain.toml ci-build/
      - name: Copy patch directives into synthetic crate
        run: |
          echo "[patch.crates-io]" >> ./ci-build/Cargo.toml
          cat ./crate_root/Cargo.toml | sed "0,/.\+\(patch.crates.\+\)/d" >> ./ci-build/Cargo.toml
      - name: Add no_std pragma to lib.rs
        run: |
          echo "#![no_std]" > ./ci-build/src/lib.rs
      - name: Add orchard as a dependency of the synthetic crate
        working-directory: ./ci-build
        run: cargo add --no-default-features --path ../crate_root
      - name: Add lazy_static with the spin_no_std feature
        working-directory: ./ci-build
        run: cargo add lazy_static --no-default-features --features "spin_no_std"
      - name: Add typenum with no default features
        working-directory: ./ci-build
        run: cargo add typenum --no-default-features
      - name: Copy pinned dependencies into synthetic crate
        run: cp crate_root/Cargo.lock ci-build/
      - name: Add target
        working-directory: ./ci-build
        run: rustup target add ${{ matrix.target }}
      - name: Build no_std for target
        working-directory: ./ci-build
        run: cargo build --verbose --target ${{ matrix.target }}

  bitrot:
    name: Bitrot check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y $LINUX_BUILD_DEPS
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: "false"
      # Build benchmarks to prevent bitrot
      - name: Build benchmarks
        run: cargo build --benches --all-features

  book:
    name: Book tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.4.35'
      - name: Test Orchard book
        run: mdbook test book/

  codecov:
    name: Code coverage
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Generate coverage report
        run: cargo tarpaulin --engine llvm --release --timeout 600 --out xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          fail_ci_if_error: false

  # Run with nightly and `RUSTDOCFLAGS` to emulate the docs.rs render as closely as
  # possible. Requires `rustdoc::broken_intra_doc_links = "deny"` (set in `[lints]`).
  doc-links:
    name: Intra-doc links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        id: toolchain
        with:
          toolchain: nightly
      - run: rustup override set "${TOOLCHAIN}"
        shell: sh
        env:
          TOOLCHAIN: ${{ steps.toolchain.outputs.name }}
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y $LINUX_BUILD_DEPS
      - run: cargo fetch
      - name: Check intra-doc links
        run: >
          cargo doc
          --no-deps
          --all-features
          --document-private-items
        env:
          RUSTDOCFLAGS: -Z unstable-options --enable-index-page --cfg docsrs

  clippy:
    name: Clippy (MSRV)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y $LINUX_BUILD_DEPS
      - name: Run clippy
        uses: auguwu/clippy-action@9817d076b82df0194935be9db6154c56ac07b317 # 1.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          check-args: >
            --all-features
            --all-targets
          args: >
            -D warnings

  # `--all-features` cannot catch a lint that only fires when a feature is *off*. It can
  # also mask a real break: a name that is only in scope behind a feature gate looks
  # unqualified-able under `--all-features` but does not compile without it.
  clippy-nodefault:
    name: Clippy (MSRV, no default features)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: "false"
      - name: Run clippy
        run: cargo clippy --no-default-features --all-targets -- -D warnings

  clippy-nostd:
    name: Clippy (MSRV) no_std for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - wasm32-wasip1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: crate_root
      # We use a synthetic crate to ensure no dev-dependencies are enabled, which can
      # be incompatible with some of these targets.
      - name: Create synthetic crate for testing
        run: cargo init --edition 2024 --lib ci-build
      - name: Copy Rust version into synthetic crate
        run: cp crate_root/rust-toolchain.toml ci-build/
      - name: Copy patch directives into synthetic crate
        run: |
          echo "[patch.crates-io]" >> ./ci-build/Cargo.toml
          cat ./crate_root/Cargo.toml | sed "0,/.\+\(patch.crates.\+\)/d" >> ./ci-build/Cargo.toml
      - name: Add no_std pragma to lib.rs
        run: |
          echo "#![no_std]" > ./ci-build/src/lib.rs
      - name: Add orchard as a dependency of the synthetic crate
        working-directory: ./ci-build
        run: cargo add --no-default-features --path ../crate_root
      - name: Add lazy_static with the spin_no_std feature
        working-directory: ./ci-build
        run: cargo add lazy_static --no-default-features --features "spin_no_std"
      - name: Add typenum with no default features
        working-directory: ./ci-build
        run: cargo add typenum --no-default-features
      - name: Copy pinned dependencies into synthetic crate
        run: cp crate_root/Cargo.lock ci-build/
      - name: Add target
        working-directory: ./ci-build
        run: rustup target add ${{ matrix.target }}
      - name: Clippy no_std for target
        working-directory: ./ci-build
        run: cargo clippy --verbose --target ${{ matrix.target }}

  # Informative only: beta clippy shows what the next stable will complain about.
  clippy-beta:
    name: Clippy (beta)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      checks: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        id: toolchain
        with:
          toolchain: beta
          components: clippy
      - run: rustup override set "${TOOLCHAIN}"
        shell: sh
        env:
          TOOLCHAIN: ${{ steps.toolchain.outputs.name }}
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y $LINUX_BUILD_DEPS
      - name: Run Clippy (beta)
        uses: auguwu/clippy-action@9817d076b82df0194935be9db6154c56ac07b317 # 1.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          check-args: >
            --all-features
            --all-targets
          args: >
            -W clippy::all

  fmt:
    name: Rustfmt
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check formatting
        run: cargo fmt -- --check

  # The single check to mark as required in branch protection. The advisory jobs
  # (other-OS tests, beta clippy, coverage upload) are deliberately left out, so a flake
  # in one of them cannot block a merge.
  required-checks:
    name: Required status checks have passed
    needs:
      - test
      - build-nostd
      - build-latest
      - bitrot
      - book
      - clippy
      - clippy-nodefault
      - clippy-nostd
      - doc-links
      - fmt
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether all required-pass steps succeeded
        run: echo "${NEEDS}" | jq -e '[ .[] | .result == "success" ] | all'
        env:
          NEEDS: ${{ toJSON(needs) }}
