# Build and deploy the onboarding course (Docusaurus 3) on every push to the
# onboarding branch.
#
# This workflow deploys the built site via GitHub Pages without committing
# the rendered output back to the onboarding branch. Repository setting
# required (one-time): Settings -> Pages -> Source -> "GitHub Actions".

name: Onboarding docs

on:
  push:
    branches:
      - onboarding
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-onboarding-docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: onboarding/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install ruff

      - name: Check Python formatting (onboarding/data)
        working-directory: onboarding/data
        run: ruff format --check .

      - name: Lint Python (onboarding/data)
        working-directory: onboarding/data
        run: ruff check .

      - name: Smoke-test the v5 transaction parser
        working-directory: onboarding/data
        run: |
          set -euo pipefail
          # Parse the 3-Action vector and assert the expected
          # invariants hold. If the JSON mirror, the parser, or
          # the ZIP 244 vectors ever drift, this fails the deploy.
          out=$(python3 parse_v5.py 2)
          echo "$out" | grep -F 'nActionsOrchard (CS)  3'
          echo "$out" | grep -F 'Orchard region total:         3031'
          echo "$out" | grep -F 'leftover bytes (should be 0): 0'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: onboarding
        run: npm install

      - name: Build site
        working-directory: onboarding
        run: npx docusaurus build

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: onboarding/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
